<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soenneker.Blazor.DataTables.Demo</title>
    <base href="/" />
    <link href="css/quark-tailwind.min.css" rel="stylesheet" />
    <script>
        (() => {
            const storageKey = "quark-theme";
            const storedTheme = localStorage.getItem(storageKey);
            const resolvedTheme = storedTheme === "dark" ? "dark" : "light";

            if (!storedTheme) {
                localStorage.setItem(storageKey, "light");
            }

            document.documentElement.classList.toggle("dark", resolvedTheme === "dark");
        })();
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.0.5/css/dataTables.bootstrap5.min.css" integrity="sha256-Y2OgJvadrK+FJojQ02VCCRhrZp9J2mn3hnMFfKACXjU=" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-responsive-bs5@3.0.2/css/responsive.bootstrap5.min.css" integrity="sha256-LliUrn7vT0PjsdPWfsGcQdDPMI0faaUPWzVGQahZkCQ=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-buttons-bs5@3.0.2/css/buttons.bootstrap5.min.css" integrity="sha256-mZGW1q6IY11/dWqw7dyoD0F+pyVADXjcZVnERfEsljw=" crossorigin="anonymous">

    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha256-whL0tQWoY1Ku1iskqPFvmZ+CHsvmRWx/PIoEvIeWh4I=" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha256-rMfkFFWoB2W1/Zx+4bgHim0WC7vKRVrq6FTeZclH1Z4=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@2.0.5/js/dataTables.min.js" integrity="sha256-klzaJAbCTWSQlvX8TVThSVrsAbhK+9urFKgJTZ2uqN8=" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/datatables.net-buttons@3.0.2/js/dataTables.buttons.min.js" integrity="sha256-VAdDsX09lQ0SIcfVGILlg19xahlU2jwzNTHaWclwriE=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net-buttons-bs5@3.0.2/js/buttons.bootstrap5.min.js" integrity="sha256-EAQW612/AbcaXbQYaOcnNr4p0k8tUDPngTtbVRF0nNs=" crossorigin="anonymous"></script>
